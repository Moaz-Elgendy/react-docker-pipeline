name: React-deploy
 
on:
  push:
   branches:
    - main

  pull_request:
   branches:
    - main

jobs:
  test-and-deploy:
   runs-on: ubuntu-latest
   
   steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
    
    - name: Build Docker Image
      run: docker build -t react-lab-test -f Dockerfile.dev .

    - name: Run Tests
      run: docker run -e CI=true react-lab-test npm run test 
  
    - name: Build Deployment Docker Image
      run: docker build -t react-lab-deploy .

    - name: Install Dependencies
      run: npm install

    - name: Build Production Files
      run: npm run build  

    - name: Create Deployment Artifact
      run: zip -r react-build.zip build

    - name: Verify Artifact
      run: ls -lh | grep react-build.zip

    - name: Configure AWS Crednetials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Upload Artifact to S3
      run: aws s3 cp react-build.zip s3://${{ secrets.S3_BUCKET}}/react-build.zip

    - name: Deploy to EC2
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script:
          echo "Connected to EC2!"
          pwd
          ls
